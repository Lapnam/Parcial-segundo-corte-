<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Espacios Culturales</title>
</head>
<body>

    <h1>Gestión de Espacios Culturales</h1>

    <!-- REGISTRAR ESPACIO -->
    <h2>Registrar Espacio</h2>

    <input id="nombre" placeholder="Nombre del espacio"><br><br>
    <input id="capacidad" type="number" placeholder="Capacidad"><br><br>

    <select id="estado">
        <option value="operativo">Operativo</option>
        <option value="no_operativo">No operativo</option>
    </select><br><br>

    <input id="dependencia" placeholder="Dependencia"><br><br>

    <button id="crearEspacioBtn">Crear Espacio</button>

    <p id="resultadoEspacio"></p>

    <hr>

    <!-- CREAR RESERVA -->
    <h2>Crear Reserva</h2>

    <input id="espacio_id" type="number" placeholder="ID del espacio"><br><br>
    <input id="fecha" type="date"><br><br>
    <input id="hora_inicio" type="time"><br><br>
    <input id="hora_fin" type="time"><br><br>
    <input id="aforo" type="number" placeholder="Aforo"><br><br>

    <button id="crearReservaBtn">Crear Reserva</button>

    <p id="resultadoReserva"></p>

    <hr>

    <!-- CONSULTAR -->
    <h2>Consultar Reserva</h2>

    <input id="reserva_id" type="number" placeholder="ID reserva"><br><br>

    <button id="consultarReservaBtn">Consultar</button>

    <ul id="resultadoConsulta"></ul>

    <!-- SCRIPT -->
    <script src="js/sql.js"></script>

</body>
</html>
